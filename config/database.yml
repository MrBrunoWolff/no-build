# SQLite configuration for the No-Build template
#
# This is a template configuration file designed to work out-of-the-box
# with minimal setup. For a real application, you might want to customize
# this file based on your production requirements.

default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: ":memory:"
  # Alternatively, use a file-based database:
  # database: db/development.sqlite3

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: ":memory:"
  # Alternatively, use a file-based database:
  # database: db/test.sqlite3

production:
  <<: *default
  # For production, you should use a real database system
  # and store the database configuration securely.
  # See the Rails guides for more information.
  database: db/production.sqlite3
  # Or use an environment variable to keep credentials out of the codebase:
  # database: <%= ENV['DATABASE_URL'] %> 